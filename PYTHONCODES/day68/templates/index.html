{% extends "base.html" %}
{% block content %}
  <div class="box">
    <h1>Flask Authentication</h1>
    {% if not current_user.is_authenticated %}
      <a href="{{ url_for("login") }}"
         class="btn btn-primary btn-block btn-large">Login</a>
      <a href="{{ url_for("register") }}"
         class="btn btn-secondary btn-block btn-large">Register</a>
    {% else %}
      <p>Hello {{ current_user.name }} . You are already authenticated.</p>
    {% endif %}
  </div>
{% endblock %}
