{% extends "base.html" %}
{% block title %}Library{% endblock %}
{% block content %}
  <div class="container mt-5">
    <h1 class="mb-4">My Library</h1>
    {% if books %}
      <table class="table table-striped table-hover">
        <thead class="table-dark">
          <tr>
            <th>Book Name</th>
            <th>Author</th>
            <th>Rating</th>
          </tr>
        </thead>
        <tbody>
          {% for book in books %}
            <tr>
              <td>{{ book.bookname }}</td>
              <td>{{ book.author }}</td>
              <td>{{ book.rating }}</td>
            </tr>
          {% endfor %}
        </tbody>
      </table>
    {% else %}
      <p>No books yet!</p>
    {% endif %}
    <a class="btn btn-primary mt-3" href="{{ url_for("add_book") }}">Add New Book</a>
  </div>
{% endblock %}
