<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport"
          content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    {% block styles %}
      {{ bootstrap.load_css() }}
      <link rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300;600&family=Inter:wght@300;400;500;600&display=swap" />
      <link rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.14.0/css/all.min.css"
            integrity="sha512-1PKOgIY59xJ8Co8+NE6FZ+LOAZKjy+KY8iq0G4B3CyeY6wYHN3yt9PW0XpSriVlkMXe40PTKnXrLnZ9+fkDaog=="
            crossorigin="anonymous" />
      <link rel="stylesheet"
            href="{{ url_for('static', filename='css/styles.css') }}" />
    {% endblock %}
    <title>
      {% block title %}{% endblock %}
    </title>
  </head>
  <body>
    <header class="site-header">
      <a class="site-title" href="{{ url_for("home") }}">🎬 My Top 10</a>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
        <i class="fas fa-moon" id="themeIcon"></i>
      </button>
    </header>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div style="max-width:1380px;margin:1rem auto;padding:0 2rem;">
          {% for message in messages %}
            <div class="alert alert-info alert-dismissible fade show" role="alert">
              {{ message }}
              <button type="button"
                      class="btn-close"
                      data-bs-dismiss="alert"
                      aria-label="Close"></button>
            </div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
    <script>
      const html = document.documentElement;
      const btn = document.getElementById('themeToggle');
      const icon = document.getElementById('themeIcon');

      const saved = localStorage.getItem('theme') || 'light';
      html.setAttribute('data-theme', saved);
      icon.className = saved === 'dark' ? 'fas fa-sun' : 'fas fa-moon';

      btn.addEventListener('click', () => {
        const current = html.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        icon.className = next === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
      });
    </script>
  </body>
</html>
